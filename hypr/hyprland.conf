################
### MONITORS ###
################

monitor=,preferred,auto-left,auto

###################
### MY PROGRAMS ###
###################

$terminal = ghostty
$fileManager = thunar
$menu = walker

#################
### AUTOSTART ###
#################

exec-once = swaync
exec-once = waybar & hyprpaper
exec-once = systemctl --user start hyprpolkitagent
exec-once = cursor-clip --daemon
exec-once = hyprpm reload
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start elephant
exec-once = walker --gapplication-service
exec-once = easyeffects --service-mode -w

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = QT_QPA_PLATFORMTHEME,gtk3

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 5

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgb(fe8019)
    col.inactive_border = rgb(665c54)
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 0.97
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    disable_splash_rendering = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:caps_toggle
    kb_rules =

    sensitivity = -0.3 # -1.0 - 1.0, 0 means no modification.

    numlock_by_default = true
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, Q, exec, $terminal
bind = ALT, F4, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, Down, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = SUPER, V, exec, cursor-clip
bind = , Print, exec, flameshot gui

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = ALT, Tab, cyclenext, visible hist
bind = , F23, swapactiveworkspaces, current -1
bind = SUPER, z, easymotion, action:hyprctl dispatch focuswindow address:{}

bind = $mainMod CTRL, left, swapwindow, l
bind = $mainMod CTRL, right, swapwindow, r
bind = $mainMod CTRL, up, swapwindow, u
bind = $mainMod CTRL, down, swapwindow, d

# Switch workspaces with mainMod + [0-9]
bind = , code:87, workspace, 1
bind = , code:88, workspace, 2
bind = , code:89, workspace, 3
bind = , code:83, workspace, 4
bind = , code:84, workspace, 5
bind = , code:85, workspace, 6
bind = , code:79, workspace, 7
bind = , code:80, workspace, 8
bind = , code:81, workspace, 9
bind = , code:90, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SHIFT, code:87, movetoworkspacesilent, 1
bind = SHIFT, code:88, movetoworkspacesilent, 2
bind = SHIFT, code:89, movetoworkspacesilent, 3
bind = SHIFT, code:83, movetoworkspacesilent, 4
bind = SHIFT, code:84, movetoworkspacesilent, 5
bind = SHIFT, code:85, movetoworkspacesilent, 6
bind = SHIFT, code:79, movetoworkspacesilent, 7
bind = SHIFT, code:80, movetoworkspacesilent, 8
bind = SHIFT, code:81, movetoworkspacesilent, 9
bind = SHIFT, code:90, movetoworkspacesilent, 10

# Example special workspace (scratchpad)
bind = $mainMod SHIFT, Up, togglespecialworkspace, magic
bind = $mainMod SHIFT, Left, movetoworkspacesilent, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = ALT, mouse_down, workspace, e+1
bind = ALT, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = ALT, mouse:272, movewindow
bindm = ALT, mouse:273, resizewindow

$resizeRatio = 40
binde = $mainMod, A, resizeactive, -$resizeRatio 0
binde = $mainMod, S, resizeactive, 0 $resizeRatio
binde = $mainMod, D, resizeactive, 0 -$resizeRatio
binde = $mainMod, F, resizeactive, $resizeRatio 0

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    name = flameshot-multi-display-fix
    match:class = flameshot

    rounding = 0
    border_size = 0
    fullscreen_state = 0 0
    float = on
    pin = on
    monitor = VGA-1
    move = 0 0
    size = (monitor_w*2) (monitor_h)
}

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

plugin {
  easymotion {
    #font size of the text
    textsize=30

    #color of the text, takes standard hyprland color format (gruvbox bright yellow)
    textcolor=rgba(fabd2fff)

    #background color of the label box. alpha is respected (gruvbox dark gray)
    bgcolor=rgba(282828ee)

    #enable blur. The bgcolor alpha must be at least semi-transparent.
    blur=0

    #Set blur alpha value. Blur must be enabled (float value)
    blurA=1.0

    #Set xray. Blur must be enabled
    xray=0

    #font to use for the label. This is passed directly to the pango font description
    textfont=JetBrains Mono Bold

    #padding around the text (inside the label box) size in pixels, adjusted for
    #monitor scaling. This is the same format as hyprland's gapsin/gapsout workspace layout rule
    #example: textpadding=2 5 5 2 (spaces not commas)
    textpadding=8 14 8 14

    #size of the border around the label box. A border size of zero disables border rendering.
    bordersize=2

    #color of the border. takes the same format as hyprland's border (so it can be a gradient) (gruvbox orange)
    bordercolor=rgba(fe8019ff)

    #rounded corners? Same as hyprland's 'decoration:rounding' config
    rounding=10

    #what to do if a window is fullscreen
    #none: nothing. (easymotion label won't be displayed on that window)
    #toggle: take the window out of fullscreen entirely.
    #maximize: convert the window to maximized.
    #windows are restored to fullscreen after easymotion is exited/selected
    fullscreen_action=none

    #which keys to use for selecting windows
    motionkeys=hjklgfdsaewqinmoptuvbcxyz1234567890

    #which keys to use for labeling windows
    motionlabels=HJKLGFDSAEWQINMOPTUVBCXYZ1234567890

    #if a monitor has a focused special workspace, only put easymotion labels on the windows in the special workspace
    only_special = false
  }
}
